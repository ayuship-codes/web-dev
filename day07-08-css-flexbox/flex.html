<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: antiquewhite;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .logo img {
            width: 124px;

        }

        .right ul {
            display: flex;
            gap: 15px;
        }

        .right ul li {
            list-style: none;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        @media only screen and (min-width: 768px) {
            .boxes {                
               grid-template-columns: 1fr; 
                             
            }
        }
        .boxes{
            margin:50px;
            background-color: bisque;
            display: grid;
            justify-content: center;
            align-content: center;
            /*grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));*/
            grid-template-columns: 1fr 1fr 1fr;
            gap:30px;
            overflow: hidden hidden;
            /*display:flex;
            flex-wrap: wrap;
            gap:10px;*/
        }
        .boxes div{            
            background-color:rgb(118, 118, 176);                   
            height:50px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="UE_Site-Logo-1.png">
            </div>
            <div class="right">
                <ul>
                    <li>Products</li>
                    <li>Pricing</li>
                    <li>Resources</li>
                    <li>About us</li>

                </ul>
                
            </div>
            <div><svg xmlns="http://www.w3.org/2000/svg" width="18" height="24" viewBox="0 0 24 24" fill="none"
                        color="currentColor" class="h-5 w-5 text-[#696D6E] hover:text-black">
                        <path d="M17 17L21 21" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="1.5"></path>
                        <path
                            d="M19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19C15.4183 19 19 15.4183 19 11Z"
                            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
                        </path>
                    </svg>
            </div>
        </nav>
    </header>
    <main class="boxes">
        <div>box1</div>
        <div>box2</div>
        <div>box3</div>
        <div>box4</div>
        <div>box5</div>
        <div>box6</div>
    </main>
</body>

</html>
