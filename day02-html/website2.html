<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>website-02</title>
</head>
<body>
    <header>
        <h1>Media Player Using HTML</h1>
    </header>
    <main>
        <section>
            <h2>Videos:</h2>
            <figure>
                <figurecaption>Night Sky</figurecaption>
                <video src="media-files/v1.mp4" width="200" controls ></video>
            </figure>
            <figure>
                <figurecaption>Sunlight through tree leaves</figurecaption>
                <video src="media-files/v2.mp4" width="200" controls ></video>
            </figure>
            <figure>
                <figurecaption>Dessert</figurecaption>
                <video src="media-files/v3.mp4" width="200" controls ></video>
            </figure>
            <figure>
                <figurecaption>Tree</figurecaption>
                <video src="media-files/v4.mp4" width="200" controls ></video>
            </figure>
            <figure>
                <figurecaption>Snowfall Landscape</figurecaption>
                <video src="media-files/v5.mp4" width="200" controls ></video>
            </figure>
            <figure>
                <figurecaption>Flowers blooming</figurecaption>
                <video src="media-files/v7.mp4" width="200" controls ></video>
            </figure>
        </section>
        <section>
            <h2>Audios:</h2>
            <figure>
                <figurecaption>Energetic Music</figurecaption>
                <audio src="media-files/m1.mp3" controls></audio>
            </figure>
             <figure>
                <figurecaption>Joyful Music</figurecaption>
                <audio src="media-files/m2.mp3" controls></audio>
            </figure>
             <figure>
                <figurecaption>Calming Music</figurecaption>
                <audio src="media-files/m3.mp3" controls></audio>
            </figure>
             <figure>
                <figurecaption>Movie Song</figurecaption>
                <audio src="media-files/m4.mp3" controls></audio>
            </figure>
             <figure>
                <figurecaption>Motivation </figurecaption>
                <audio src="media-files/m2.mp3" controls></audio>
            </figure>
             <figure>
                <figurecaption>Youthful Music</figurecaption>
                <audio src="media-files/m4.mp3" controls></audio>
            </figure>
        </section>
    </main>

    
</body>
</html>
