<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation ball</title>
    <style>
        .container{
            background-color: rgb(113, 113, 199);
            width:90vw;
            height:80vh;
            position:absolute;
        }
        .ball{
            background-color:brown;
            width:50px;
            height:50px;
            border-radius:60px; 
            position:absolute; 
            bottom:0;
            left:0;
            animation:ballX 4s linear infinite,
                      ballY 1s ease-out infinite alternate;
            
        }
        @keyframes ballX{
            from{left:0;}
            to{left:100%}
        }
        @keyframes ballY{
            from{ bottom:0;}
            to{bottom:100%}
        }
        
    </style>
</head>
<body>
   <div class="container">
        <section class="ball"></section>
   </div> 
</body>
</html>
