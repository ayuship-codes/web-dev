<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: antiquewhite;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .logo img {
            width: 124px;

        }

        .right ul {
            display: flex;
            gap: 15px;
        }

        .right ul li {
            list-style: none;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        
        .grid{
            margin:30px;            
            display: grid;        
            grid-template-columns: repeat(3, 1fr);
            gap:20px;
            align-items: center;
            justify-items: center;
            
        }
        @media screen and (max-width: 455px) {
            .grid {                
               grid-template-columns: 1fr;                                            
            }
            .right ul li{
                font-size: 10px;
            }
            .logo img{
                width:80px;
            }
            svg{
                width:10px;
            }
        }
        .item{            
            background-color:rgb(250, 244, 222);  
            border-radius: 20px;
            height:150px;
            width:300px;
            align-content: center;
            text-align: center;          
            gap: 10px; 
        }
        .item a{
            background-color: rgb(251, 213, 44);
            border-radius: 5px;
            border:none;
            padding: 4px 10px;  
            font-size: 15px; 
            margin-top: 5px;  
            text-decoration: none;
            color: black;
            display: inline-block;       
        }
        .item div:nth-child(1){
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="UE_Site-Logo-1.png">
            </div>
            <div class="right">
                <ul>
                    <li>Products</li>
                    <li>Pricing</li>
                    <li>Resources</li>
                    <li>About us</li>

                </ul>
                
            </div>
            <div><svg xmlns="http://www.w3.org/2000/svg" width="18" height="24" viewBox="0 0 24 24" fill="none"
                        color="currentColor" class="h-5 w-5 text-[#696D6E] hover:text-black">
                        <path d="M17 17L21 21" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="1.5"></path>
                        <path
                            d="M19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19C15.4183 19 19 15.4183 19 11Z"
                            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
                        </path>
                    </svg>
            </div>
        </nav>
    </header>
    <main class="boxes">
        <section class="first"> 
            <div>

            </div>
        </section>
        <section class="second">
            <div class="grid">
                <div class="item">
                    <div>English</div>
                    <div>Includes all languages</div>
                    <a href="" download class="button">Download 64-bit</a>
                </div>
                <div class="item">
                    <div>Deusch</div>
                    <div>German</div>
                    <a href="" download class="button">Download 64-bit</a>
                </div>
                <div class="item">
                    <div>Italiano</div>
                    <div>Italian</div>
                    <a href="" download class="button">Download 64-bit</a>
                </div>
                <div class="item">
                    <div>Espanol</div>
                    <div>Spanish</div>
                    <a href="" download class="button">Download 64-bit</a>
                </div>
                <div class="item">
                    <div>Francais</div>
                    <div>French</div>
                    <a href="" download class="button">Download 64-bit</a>
                </div>
                <div class="item">
                    <div>Portugues brasileiro</div>
                    <div>Brazillian Portuguese</div>
                    <a href="" download class="button">Download 64-bit</a>
                </div>
                
            </div>
        </section>
    </main>
</body>

</html>
