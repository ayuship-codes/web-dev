<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS </title>
    <style>
        *{
           margin: 0;
           padding: 0;
        }
        body{

        }
        nav{
            background-color: rgb(192, 169, 235);
            padding:10px; 
            position:fixed;          
        }
        ul li{
            display: inline;
            padding: 20px;
        }
        main{
            text-align: center;
            margin-top: 10px;
            background-color: beige;
        }
        .boxes span{
            border: 2px solid black;
            display:inline-block;
            width: 200px;
            height: 200px;
            justify-content: center;
        }
        .box1{
            background-color: blue;
        }
        .box2{
            background-color: orange;
        }
        main div{
            border:2px solid black;  
            border-radius: 40px;          
            margin:20px;
            height: 100px;;
        }
        footer{
            background-color: grey;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a>Home</a></li>
                <li><a>About</a></li>
                <li><a>Services</a></li>
                <li><a>Contact us</a></li>
            </ul>
        </nav>
    </header>
    <main class="boxes">
        <span class="box1">box1</span>
        <span class="box2">box1</span>
        <div>box3</div>
    </main>
    <footer>details</footer>
    
</body>
</html>
