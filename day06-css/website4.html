<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS </title>
    <style>
        *{
           margin: 0;
           padding: 0;
        }
        body{
             height: 1000px;
             width:100%;

        }
        nav{
            background-color: rgb(192, 169, 235);
            padding:10px; 
            position:fixed; 
            top:0; 
            height: 80px;
            width:100%;
            margin: 0;
            padding: 0;    
        }
        nav ul li{
            display: inline;
            padding:  30px 20px;
            margin-top:20px;
        }
        main{
            text-align: center;         
            margin-top:100px;
            background-color: beige;          
            
        }
        .boxes span{
            border: 2px solid black;
            display:inline-block;
            width: 200px;
            height: 200px;
            justify-content: center;          
            
        }
        .box1{
            background-color: blue;
        }
        .box2{
            background-color: orange;
        }
        .box3{
            border:2px solid black;  
            border-radius: 40px;          
            margin:20px;
            height: 400px;;
        }
        footer{
            background-color: grey;
            height: 60px;
        }
        .logo{
            border: 2px solid black;
            border-radius: 50px;
            width:30px;
            height:30px;
            margin-left: 80vw;
            position:fixed;
            bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a>Home</a></li>
                <li><a>About</a></li>
                <li><a>Services</a></li>
                <li><a>Contact us</a></li>
            </ul>
        </nav>
    </header>
    <main class="boxes">
       
            <span class="box1">box1</span>
            <span class="box2">box1</span>
            <div class="box3">box3</div>
        
    </main>
    <footer>
        <div class="logo">
            <img src="">
        </div>
    </footer>
    
</body>
</html>
